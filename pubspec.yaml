name: lightmeup
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  # Persistent settings across app restarts (encrypted)
  flutter_secure_storage: ^9.0.0

  # Foreground service that survives app close
  flutter_foreground_task: ^8.0.0

  # Color picker widget
  flutter_colorpicker: ^1.0.3

  # State management
  provider: ^6.1.1

  vibration: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
